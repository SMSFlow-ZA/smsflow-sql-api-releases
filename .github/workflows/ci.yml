name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate public content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate public release content
        run: npm run release:validate

      - name: Validate demo compose file
        run: docker compose -f deploy/demo/try-it-in-10-minutes/docker-compose.yml config

  demo-smoke:
    name: Smoke test Docker demo
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run demo smoke test
        shell: pwsh
        run: npm run release:smoke-demo
