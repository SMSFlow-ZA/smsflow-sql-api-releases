services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ChangeThis_DemoOnly_12345"
    ports:
      - "14333:1433"
    volumes:
      - sql-data:/var/opt/mssql

  schema:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver
    volumes:
      - ./sql:/demo-sql:ro
      - ../../../examples/sql/sql_integration.sql:/schema/sql_integration.sql:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        if [ ! -x "$$SQLCMD" ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd; fi
        for attempt in $$(seq 1 60); do
          if "$$SQLCMD" -S sqlserver -U sa -P ChangeThis_DemoOnly_12345 -C -Q "SELECT 1" >/dev/null 2>&1; then
            break
          fi
          echo "Waiting for SQL Server... ($$attempt/60)"
          sleep 2
        done
        "$$SQLCMD" -S sqlserver -U sa -P ChangeThis_DemoOnly_12345 -C -i /demo-sql/00-create-database.sql
        "$$SQLCMD" -S sqlserver -U sa -P ChangeThis_DemoOnly_12345 -C -d SmsFlowDemo -i /schema/sql_integration.sql
        "$$SQLCMD" -S sqlserver -U sa -P ChangeThis_DemoOnly_12345 -C -d SmsFlowDemo -i /demo-sql/01-verify-schema.sql

  worker:
    image: smsflow-sql-api-worker:0.3.0
    depends_on:
      schema:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      SMSFLOW_SQL_INTEGRATION_ROOT: /smsflow
    volumes:
      - ./config/worker/appsettings.json:/smsflow/config/worker/appsettings.json:ro
      - worker-logs:/smsflow/logs/worker

  seed:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      worker:
        condition: service_started
    volumes:
      - ./sql:/demo-sql:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        if [ ! -x "$$SQLCMD" ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd; fi
        "$$SQLCMD" -S sqlserver -U sa -P ChangeThis_DemoOnly_12345 -C -d SmsFlowDemo -i /demo-sql/02-seed-sample-messages.sql

  validate:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver
    volumes:
      - ./sql:/demo-sql:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        if [ ! -x "$$SQLCMD" ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd; fi
        "$$SQLCMD" -S sqlserver -U sa -P ChangeThis_DemoOnly_12345 -C -d SmsFlowDemo -i /demo-sql/03-validation-queries.sql

volumes:
  sql-data:
  worker-logs:
