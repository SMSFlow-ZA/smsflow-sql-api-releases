image:
  repository: YOUR_REGISTRY/smsflow-sql-api-worker
  tag: "0.3.0"
  pullPolicy: IfNotPresent

config:
  connectionString: "Server=YOUR_SQL_SERVER;Database=YOUR_SQL_DATABASE;User Id=YOUR_SQL_USER;Password=YOUR_SQL_PASSWORD;Encrypt=True;TrustServerCertificate=True;Command Timeout=30"
  portalMode: "Simulated"
  portalBaseUrl: ""
  apiKey: ""
  channelType: "Marketing"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi
